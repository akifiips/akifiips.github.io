<div class="sidebar">
  <div class="container sidebar-sticky">
    <div class="sidebar-about">
      {% if site.avatar %}
       <img src="{{ site.avatar }}" alt="{{ site.title }} Avatar" class="profile-pic" style="border-radius: 50%; width: 230px; height: 230px; display: block; margin-left: auto; margin-right: auto; margin-bottom: 130px;">
       {% endif %}
      <h1>
        <a href="{{ site.baseurl }}">
          {{ site.title }}
        </a>
      </h1>
      <p class="lead">{{ site.description }}</p>
    </div>

    <nav class="sidebar-nav">
    </nav>

    <p>&copy; {{ site.time | date: '%Y' }}. All rights reserved.</p>
  </div>
</div>
